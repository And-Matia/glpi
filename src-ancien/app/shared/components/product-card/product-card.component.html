<div class="product-card">
  @if (product().badge === 'hot') {
    <app-badge variant="danger" size="sm" class="product-card__badge">HOT</app-badge>
  } @else if (product().badge === 'new') {
    <app-badge variant="success" size="sm" class="product-card__badge">NEW</app-badge>
  }

  <a [routerLink]="['/products', product().id]" class="product-card__img-link">
    @if (product().imageUrl) {
      <img
        [ngSrc]="product().imageUrl!"
        [alt]="product().name"
        class="product-card__img"
        fill
        loading="lazy"
      />
    } @else {
      <div class="product-card__img-placeholder">
        <i class="fa-solid fa-image"></i>
      </div>
    }
  </a>

  <div class="product-card__body">
    <p class="product-card__ref">{{ product().reference }}</p>
    <h2 class="product-card__name">
      <a [routerLink]="['/products', product().id]">{{ product().name }}</a>
    </h2>
    <p class="product-card__price">{{ formatPrice(product().price) }} <span class="product-card__price-label">TTC</span></p>
    @if (product().hasCombinations) {
      <p class="product-card__variants-hint">Plusieurs variants disponibles</p>
    }
  </div>

  <div class="product-card__footer">
    <a [routerLink]="['/products', product().id]" class="product-card__btn">
      <i class="fa-solid fa-eye"></i> Voir le produit
    </a>
  </div>
</div>
