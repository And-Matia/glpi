<div class="login">
  <form class="login__form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <h1 class="login__title">Backoffice</h1>

    @if (error()) {
      <p class="login__error">{{ error() }}</p>
    }

    <label for="username">
      Identifiant
      <input type="text" id="username" formControlName="username" autocomplete="username" />
    </label>

    <label for="password">
      Mot de passe
      <input type="password" id="password" formControlName="password" autocomplete="current-password" />
    </label>

    <button type="submit" [disabled]="loading() || loginForm.invalid">
      {{ loading() ? 'Connexion…' : 'Se connecter' }}
    </button>
  </form>
</div>
