<div class="orders-page">

  <app-page-header
    title="Commandes"
    subtitle="Consultez et modifiez l'état des commandes"
  />

  @if (error()) {
    <app-alert type="error">{{ error() }}</app-alert>
  }

  @if (loading()) {
    <div class="orders-loading">
      <app-loader size="md"/>
      <span>Chargement des commandes…</span>
    </div>
  } @else {

    <app-table
      [columns]="tableColumns"
      [rows]="rows()"
      [searchKeys]="['reference', 'customerName', 'id']"
      emptyIcon="fa-solid fa-receipt"
      emptyLabel="Aucune commande trouvée"
    >
      <!-- État -->
      <ng-template appCell="stateLabel" let-row>
        <app-badge [variant]="row['stateVariant']">{{ row['stateLabel'] }}</app-badge>
      </ng-template>

       <!-- Actions -->
       <ng-template appCell="_actions" let-row>
         <div class="orders-actions">
           @if (isUpdating(row['id'])) {
             <app-loader size="sm"/>
           } @else {
             <!-- Note: État "Payé" n'est pas modifiable via l'API PrestaShop (seuls Livré et Annulé sont supportés) -->
             <app-button
               variant="danger"
               size="sm"
               [disabled]="row['stateId'] === STATE_CANCELLED || row['stateId'] === STATE_DELIVERED"
               (click)="setStateCancelled(row['id'])"
             >
               <i class="fa-solid fa-circle-xmark"></i> Annuler
             </app-button>
             <app-button
               variant="primary"
               size="sm"
               [disabled]="row['stateId'] === STATE_DELIVERED"
               (click)="setStateDelivered(row['id'])"
             >
               <i class="fa-solid fa-truck"></i> Livrer
             </app-button>
           }
         </div>
       </ng-template>
    </app-table>

    <app-carts></app-carts>

  }

</div>
