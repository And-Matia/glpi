<aside class="sidebar" [class.sidebar--collapsed]="!isOpen()">

  <button class="sidebar__toggle" (click)="toggle()" title="Toggle sidebar">
    @if (isOpen()) {
      <i class="fa-solid fa-chevron-left"></i>
    } @else {
      <i class="fa-solid fa-chevron-right"></i>
    }
  </button>

  <nav class="sidebar__nav">
    <ul>
      <li>
        <a routerLink="/admin/dashboard" routerLinkActive="active">
          <span class="sidebar__icon"><i class="fa-solid fa-chart-simple"></i></span>
          @if (isOpen()) { <span class="sidebar__label">Dashboard</span> }
        </a>
      </li>
      <li>
        <a routerLink="/admin/import" routerLinkActive="active">
          <span class="sidebar__icon"><i class="fa-solid fa-upload"></i></span>
          @if (isOpen()) { <span class="sidebar__label">Import</span> }
        </a>
      </li>
      <li>
        <a routerLink="/admin/reset" routerLinkActive="active">
          <span class="sidebar__icon"><i class="fa-solid fa-rotate-left"></i></span>
          @if (isOpen()) { <span class="sidebar__label">ResetService</span> }
        </a>
      </li>
      <li>
        <a routerLink="/admin/orders" routerLinkActive="active">
          <span class="sidebar__icon"><i class="fa-solid fa-receipt"></i></span>
          @if (isOpen()) { <span class="sidebar__label">Commandes</span> }
        </a>
      </li>
      <li>
        <a routerLink="/admin/stock" routerLinkActive="active">
          <span class="sidebar__icon"><i class="fa-solid fa-boxes-stacked"></i></span>
          @if (isOpen()) { <span class="sidebar__label">Stock</span> }
        </a>
      </li>
      <li>
        <a routerLink="/admin/stats" routerLinkActive="active">
          <span class="sidebar__icon"><i class="fa-solid fa-chart-line"></i></span>
          @if (isOpen()) { <span class="sidebar__label">Statistiques</span> }
        </a>
      </li>
      <li>
        <a href="javascript:void(0)" (click)="logout()">
          <span class="sidebar__icon"><i class="fa-solid fa-right-from-bracket"></i></span>
          @if (isOpen()) { <span class="sidebar__label">Déconnexion</span> }
        </a>
      </li>
    </ul>
  </nav>

</aside>
