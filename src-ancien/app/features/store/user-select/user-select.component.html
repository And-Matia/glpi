<div class="user-select">

  <div class="user-select__hero">
    <h1 class="user-select__title">Bienvenue</h1>
    <p class="user-select__sub">Sélectionnez un compte pour continuer</p>
  </div>

  @if (error()) {
    <div class="user-select__error">{{ error() }}</div>
  }

  <div class="user-select__list">

    @if (loading()) {
      <div class="user-select__loading">
        <div class="user-select__spinner"></div>
        <span>Chargement des utilisateurs…</span>
      </div>
    } @else {
      <!-- Search -->
      <div class="user-select__search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input
          type="text"
          [ngModel]="search()"
          (ngModelChange)="search.set($event)"
          placeholder="Rechercher un utilisateur…"
          autocomplete="off"
        />
      </div>

      <!-- Registered users (scrollable) -->
      <div class="user-select__scroll">
        @for (u of filteredUsers(); track u.id) {
          <button class="user-card" (click)="select(u)">
            <div class="user-card__avatar">
              {{ u.name.charAt(0).toUpperCase() }}
            </div>
            <div class="user-card__info">
              <span class="user-card__name">{{ u.name }}</span>
              @if (u.city) {
                <span class="user-card__city">{{ u.city }}</span>
              }
            </div>
            <i class="fa-solid fa-chevron-right user-card__arrow"></i>
          </button>
        } @empty {
          <p class="user-select__no-result">Aucun utilisateur trouvé.</p>
        }
      </div>
    }

    <!-- Divider -->
    <div class="user-select__divider">
      <span>ou</span>
    </div>

    <!-- Anonymous -->
    <button class="user-card user-card--anon" (click)="select(anonymous)">
      <div class="user-card__avatar user-card__avatar--anon">
        <i class="fa-solid fa-user-secret"></i>
      </div>
      <div class="user-card__info">
        <span class="user-card__name">{{ anonymous.name }}</span>
        <span class="user-card__city">Continuer sans compte</span>
      </div>
      <i class="fa-solid fa-chevron-right user-card__arrow"></i>
    </button>

  </div>

</div>
