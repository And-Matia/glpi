<div class="ticket-create">

  <app-page-header title="Nouveau ticket" subtitle="Déclarez un incident ou une demande">
    <button mat-button (click)="goBack()">← Retour</button>
  </app-page-header>

  <div class="ticket-create__grid">

    <mat-card>
      <mat-card-header><mat-card-title>Informations du ticket</mat-card-title></mat-card-header>
      <mat-card-content>
        <div class="form">
          <app-input label="Titre *" [(value)]="titre" [errorMessage]="''" />
          <app-textarea label="Description *" [(value)]="description" [rows]="5" [errorMessage]="''" />
          <app-select label="Type *" [options]="typeOptions" [(value)]="type" />
          <app-select label="Priorité *" [options]="priorityOptions" [(value)]="priority" />
          <app-select label="Statut" [options]="statusOptions" [(value)]="status" />
          <div class="form__actions">
            <button mat-flat-button [disabled]="submitting()" (click)="onSubmit()">
              Créer le ticket
              @if (selectedCount() > 0) {
                ({{ selectedCount() }} élément{{ selectedCount() > 1 ? 's' : '' }})
              }
            </button>
          </div>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card>
      <mat-card-header><mat-card-title>Associer des éléments</mat-card-title></mat-card-header>
      <mat-card-content>
        <div class="items-panel">

          <app-search-input
            class="items-panel__search"
            placeholder="Rechercher un élément…"
            [(value)]="itemSearch"
          />

          @if (loadingItems()) {
            <div class="items-panel__loader">
              <app-spinner size="sm" />
            </div>
          } @else {
            <ul class="items-panel__list">
              @for (item of visibleAssets(); track item.id) {
                <li
                  class="items-panel__item"
                  [class.items-panel__item--selected]="isSelected(item.id)"
                  (click)="toggleItem(item.id)"
                >
                  <span class="items-panel__check">
                    @if (isSelected(item.id)) {
                      <i class="fa-solid fa-circle-check"></i>
                    } @else {
                      <i class="fa-regular fa-circle"></i>
                    }
                  </span>
                  <div class="items-panel__info">
                    <span class="items-panel__name">{{ item.name }}</span>
                    <span class="items-panel__meta">
                      <app-badge variant="info" size="sm">{{ assetLabel(item.item_type) }}</app-badge>
                      {{ item.status }}
                    </span>
                  </div>
                </li>
              } @empty {
                <li class="items-panel__empty">Aucun élément trouvé</li>
              }
            </ul>
          }

        </div>
      </mat-card-content>
    </mat-card>

  </div>
</div>
