<div class="item-list">
  <app-page-header title="Éléments" subtitle="Parc informatique">
  </app-page-header>

  <div class="item-list__filters">
    <app-search-input
      class="item-list__search"
      placeholder="Rechercher (nom, inventaire, utilisateur…)"
      [(value)]="searchText"
    />
    <app-select
      label="Type"
      [options]="typeOptions"
      [(value)]="filterType"
    />
    <app-select
      label="Statut"
      [options]="statusOptions"
      [(value)]="filterStatus"
    />
  </div>

  @if (loading()) {
    <div class="item-list__loader">
      <app-spinner size="lg" />
    </div>
  } @else if (error()) {
    <p class="item-list__error">{{ error() }}</p>
  } @else {
    <app-table
      [columns]="columns"
      [rows]="rows()"
      [showToolbar]="false"
      emptyIcon="fa-solid fa-desktop"
      emptyLabel="Aucun élément trouvé"
    >
      <ng-template appCell="item_type" let-value>
        <app-badge variant="neutral" size="sm">{{ value }}</app-badge>
      </ng-template>

      <ng-template appCell="status" let-value>
        <app-badge [variant]="statusVariant(value)" size="sm">{{ value }}</app-badge>
      </ng-template>

      <ng-template appCell="user" let-value>
        @if (value) {
          <span class="item-list__user">
            <app-avatar [name]="value" size="sm" />
            <span>{{ value }}</span>
          </span>
        } @else {
          <span class="item-list__muted">—</span>
        }
      </ng-template>

      <ng-template appCell="inventory_number" let-value>
        @if (value) {
          <code class="item-list__inv">{{ value }}</code>
        } @else {
          <span class="item-list__muted">—</span>
        }
      </ng-template>
    </app-table>
  }
</div>
