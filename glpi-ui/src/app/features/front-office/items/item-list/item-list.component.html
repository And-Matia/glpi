<div class="item-list">
  <app-page-header title="Éléments" subtitle="Parc informatique">
  </app-page-header>

  <div class="item-list__filters">
    <app-search-input
      class="item-list__search"
      placeholder="Rechercher (nom, inventaire, utilisateur…)"
      [(value)]="searchText"
    />
    <app-select
      label="Type"
      [options]="typeOptions"
      [(value)]="filterType"
    />
    <app-select
      label="Statut"
      [options]="statusOptions"
      [(value)]="filterStatus"
    />
  </div>

  @if (loading()) {
    <div class="item-list__loader">
      <app-spinner size="lg" />
    </div>
  } @else if (error()) {
    <p class="item-list__error">{{ error() }}</p>
  } @else {
    <app-table
      [columns]="columns"
      [rows]="rows()"
      [showToolbar]="false"
      emptyIcon="fa-solid fa-desktop"
      emptyLabel="Aucun élément trouvé"
    />
  }
</div>
