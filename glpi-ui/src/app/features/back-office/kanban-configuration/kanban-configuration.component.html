<app-page-header
  title="Configuration Kanban"
  subtitle="Personnalisez les couleurs et les noms des colonnes du tableau kanban."
>
  <button
    mat-flat-button
    [disabled]="saving() || loading()"
    (click)="saveAll()"
  >
    @if (saving()) { Sauvegarde... } @else { Sauvegarder }
  </button>
</app-page-header>

@if (loading()) {
  <div class="kconf__loader"><app-spinner size="lg" /></div>
} @else {
  <div class="kconf__grid">
    @for (status of statuses(); track status.id; let i = $index) {
      <mat-card class="kconf-card">
        <mat-card-header>
          <mat-card-title>Colonne {{ i + 1 }}</mat-card-title>
        </mat-card-header>

        <mat-card-content>

          <!-- Color picker -->
          <div class="kconf-card__color-row">
            <label class="kconf-card__color-label">Couleur de fond</label>
            <div class="kconf-card__color-preview" [style.background]="status.color">
              <input
                type="color"
                class="kconf-card__color-input"
                [value]="status.color"
                (input)="setColor(i, $any($event.target).value)"
              />
            </div>
          </div>

          <!-- Name inputs per language -->
          @for (nameEntry of status.names; track nameEntry.id; let ni = $index) {
            <mat-form-field appearance="outline" class="kconf-card__field">
              <mat-label>Nom ({{ nameEntry.language.name }})</mat-label>
              <input
                matInput
                [value]="nameEntry.name"
                (input)="setName(i, ni, $any($event.target).value)"
              />
            </mat-form-field>
          }

        </mat-card-content>
      </mat-card>
    }
  </div>
}
