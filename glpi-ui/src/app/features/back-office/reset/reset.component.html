<div class="reset-page">
  <app-page-header
    title="Réinitialisation"
    subtitle="Supprime définitivement toutes les données GLPI"
  />

  <div class="reset-page__body">
    @if (success()) {
      <p class="reset-page__success">Données réinitialisées avec succès.</p>
    }

    @if (error()) {
      <p class="reset-page__error">{{ error() }}</p>
    }

    <button mat-flat-button color="warn" [disabled]="loading()" (click)="openConfirmDialog()">
      Réinitialiser les données
    </button>

    @if (progress().length) {
      <app-table
        [columns]="columns"
        [rows]="progress()"
        [showToolbar]="false"
      >
        <ng-template appCell="status" let-row>
          <app-badge [variant]="statusVariant(row.status)">
            {{ row.status }}
          </app-badge>
        </ng-template>

        <ng-template appCell="progress" let-row>
          @if (row.status === 'done' || row.status === 'error' || row.status === 'deleting') {
            <div>
              {{ row.current }} / {{ row.total }}
              <app-progress-bar
                [value]="row.current"
                [max]="row.total"
                [showLabel]="true"
                [variant]="progressVariant(row.status)"
              />
            </div>
          } @else {
            <span>-</span>
          }
        </ng-template>
      </app-table>
    }
  </div>
</div>

<app-confirm-dialog
  [open]="confirmOpen()"
  title="Réinitialiser les données"
  message="Cette action supprimera définitivement tous les tickets, coûts et équipements GLPI. Opération irréversible."
  confirmLabel="Oui, tout supprimer"
  [danger]="true"
  (confirmed)="onConfirmed()"
  (cancelled)="onCancelled()"
/>
