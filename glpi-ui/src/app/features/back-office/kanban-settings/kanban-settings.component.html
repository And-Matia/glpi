<app-page-header
  title="Paramètres Kanban"
  subtitle="Personnalisez les couleurs et les noms malgaches des colonnes"
>
  <app-button variant="secondary" size="sm" (click)="reset()">Réinitialiser</app-button>
  <app-button variant="primary" size="sm" (click)="save()">Sauvegarder</app-button>
</app-page-header>

<div class="ks__grid">
  @for (col of columns(); track col.statusCode; let i = $index) {
    <app-card [title]="col.labelFr">
      <div class="ks__fields">
        <div class="ks__field">
          <label class="ks__label">Nom en malgache</label>
          <app-input
            label=""
            [value]="col.labelMg"
            (valueChange)="updateLabel(i, $event)"
          />
        </div>

        <div class="ks__field">
          <label class="ks__label">Couleur de fond</label>
          <div class="ks__color-row">
            <input
              type="color"
              class="ks__color-picker"
              [value]="col.color"
              (input)="updateColor(i, $any($event.target).value)"
            />
            <span class="ks__color-preview" [style.background]="col.color">{{ col.color }}</span>
          </div>
        </div>

        <div class="ks__preview-col" [style.background]="col.color">
          <span class="ks__preview-label">{{ col.labelMg }}</span>
          <span class="ks__preview-sub">{{ col.labelFr }}</span>
        </div>
      </div>
    </app-card>
  }
</div>
