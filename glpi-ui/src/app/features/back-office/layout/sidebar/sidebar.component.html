<aside class="sidebar" [class.sidebar--collapsed]="!isOpen()">

  <button class="sidebar__toggle" (click)="toggle()" title="Toggle sidebar">
    @if (isOpen()) {
      <i class="fa-solid fa-chevron-left"></i>
    } @else {
      <i class="fa-solid fa-chevron-right"></i>
    }
  </button>

  <nav class="sidebar__nav">
    <ul>
      <li>
        <a routerLink="/back-office/dashboard" routerLinkActive="active">
          <span class="sidebar__icon"><i class="fa-solid fa-chart-simple"></i></span>
          @if (isOpen()) { <span class="sidebar__label">Dashboard</span> }
        </a>
      </li>
      <li>
        <a routerLink="/back-office/tickets" routerLinkActive="active">
          <span class="sidebar__icon"><i class="fa-solid fa-ticket"></i></span>
          @if (isOpen()) { <span class="sidebar__label">Tickets</span> }
        </a>
      </li>
      <li>
        <a routerLink="/back-office/import" routerLinkActive="active">
          <span class="sidebar__icon"><i class="fa-solid fa-upload"></i></span>
          @if (isOpen()) { <span class="sidebar__label">Import</span> }
        </a>
      </li>
      <li>
        <a routerLink="/back-office/reset" routerLinkActive="active">
          <span class="sidebar__icon"><i class="fa-solid fa-rotate-left"></i></span>
          @if (isOpen()) { <span class="sidebar__label">Réinitialiser</span> }
        </a>
      </li>
      <li>
        <a routerLink="/back-office/kanban-settings" routerLinkActive="active">
          <span class="sidebar__icon"><i class="fa-solid fa-palette"></i></span>
          @if (isOpen()) { <span class="sidebar__label">Kanban</span> }
        </a>
      </li>
      <li>
        <a routerLink="/back-office/settings-kanban" routerLinkActive="active">
          <span class="sidebar__icon"><i class="fa-solid fa-palette"></i></span>
          @if (isOpen()) { <span class="sidebar__label">Kanban</span> }
        </a>
      </li>
      <li>
        <a href="javascript:void(0)" (click)="logout()">
          <span class="sidebar__icon"><i class="fa-solid fa-right-from-bracket"></i></span>
          @if (isOpen()) { <span class="sidebar__label">Déconnexion</span> }
        </a>
      </li>
    </ul>
  </nav>

</aside>
