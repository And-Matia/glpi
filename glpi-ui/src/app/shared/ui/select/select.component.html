<mat-form-field>
  <mat-label>{{ label() }}</mat-label>
  <mat-select [value]="value()" (selectionChange)="value.set($event.value)">
    @for (opt of options(); track opt.value) {
      <mat-option [value]="opt.value">{{ opt.label }}</mat-option>
    }
  </mat-select>
  @if (errorMessage()) {
    <mat-error>{{ errorMessage() }}</mat-error>
  }
</mat-form-field>
