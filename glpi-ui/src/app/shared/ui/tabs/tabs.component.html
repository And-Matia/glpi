<div class="tabs" role="tablist">
  @for (tab of tabs(); track tab.key) {
    <button
      class="tabs__tab"
      [class.tabs__tab--active]="activeKey() === tab.key"
      role="tab"
      [attr.aria-selected]="activeKey() === tab.key"
      (click)="activeKey.set(tab.key)"
    >
      @if (tab.icon) {
        <i [class]="tab.icon"></i>
      }
      {{ tab.label }}
      @if (tab.badge !== undefined) {
        <span class="tabs__badge">{{ tab.badge }}</span>
      }
    </button>
  }
</div>
