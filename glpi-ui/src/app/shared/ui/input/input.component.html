<mat-form-field>
  <mat-label>{{ label() }}</mat-label>
  <input
    matInput
    [type]="type()"
    [placeholder]="placeholder()"
    [value]="value()"
    (input)="value.set($any($event.target).value)"
  />
  @if (errorMessage()) {
    <mat-error>{{ errorMessage() }}</mat-error>
  }
</mat-form-field>
