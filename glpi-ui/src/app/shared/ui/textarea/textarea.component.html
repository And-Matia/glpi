<mat-form-field>
  <mat-label>{{ label() }}</mat-label>
  <textarea
    matInput
    [rows]="rows()"
    [placeholder]="placeholder()"
    [value]="value()"
    (input)="value.set($any($event.target).value)"
  ></textarea>
  @if (errorMessage()) {
    <mat-error>{{ errorMessage() }}</mat-error>
  }
</mat-form-field>
