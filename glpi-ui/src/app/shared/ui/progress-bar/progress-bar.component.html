<div class="progress">
  <div
    class="progress__track"
    role="progressbar"
    [attr.aria-valuenow]="percent()"
    aria-valuemin="0"
    aria-valuemax="100"
  >
    <div [class]="'progress__fill progress__fill--' + variant()" [style.width.%]="percent()"></div>
  </div>
  @if (showLabel()) {
    <span class="progress__label">{{ percent() }}%</span>
  }
</div>
