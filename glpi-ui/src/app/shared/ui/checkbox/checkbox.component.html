<label class="checkbox" [class.checkbox--disabled]="disabled()">
  <input
    type="checkbox"
    class="checkbox__input"
    [checked]="checked()"
    [disabled]="disabled()"
    (change)="toggle()"
  />
  <span class="checkbox__box" aria-hidden="true">
    @if (checked()) { <i class="fa-solid fa-check"></i> }
  </span>
  @if (label()) { <span class="checkbox__label">{{ label() }}</span> }
</label>
